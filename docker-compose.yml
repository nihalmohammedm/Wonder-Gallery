services:
  web:
    build:
      context: .
    command: npm run start
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  worker:
    build:
      context: .
    command: npm run worker
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
